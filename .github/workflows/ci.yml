name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax
        run: bash -n scripts/zt.sh

      - name: PowerShell syntax
        shell: pwsh
        run: |
          $null = [scriptblock]::Create((Get-Content -Raw scripts/zt.ps1))

      - name: Validate examples without local bundles
        run: |
          for file in configs/environments/*.example.yaml; do
            echo "Checking $file"
            test -s "$file"
          done

      - name: Python config helper
        run: |
          python tools/zt_config.py validate --config configs/environments/connected.example.yaml
          python tools/zt_config.py context --config configs/environments/connected.example.yaml

      - name: Test scripts syntax
        shell: pwsh
        run: |
          $null = [scriptblock]::Create((Get-Content -Raw tests/smoke.ps1))
          bash -n tests/smoke.sh

      - name: Security scan
        run: ./scripts/security-scan.sh

      - name: Package smoke
        run: ./scripts/package.sh ci
