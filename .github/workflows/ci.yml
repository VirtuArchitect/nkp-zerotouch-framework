name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install test tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          python -m pip install --upgrade pip
          python -m pip install pytest PyYAML jsonschema

      - name: Bash syntax
        run: |
          bash -n scripts/zt.sh
          bash -n tests/smoke.sh

      - name: Shellcheck
        run: shellcheck scripts/zt.sh tests/smoke.sh

      - name: PowerShell syntax
        shell: pwsh
        run: |
          $null = [scriptblock]::Create((Get-Content -Raw scripts/zt.ps1))
          $null = [scriptblock]::Create((Get-Content -Raw tests/smoke.ps1))

      - name: Validate environment configs
        run: |
          python tools/zt_config.py validate-all --directory configs/environments

      - name: Python tests
        run: |
          pytest -q

      - name: Security scan
        run: bash scripts/security-scan.sh

      - name: Package smoke
        run: bash scripts/package.sh ci

      - name: Containerfile syntax smoke
        run: test -s Dockerfile && test -s Containerfile
