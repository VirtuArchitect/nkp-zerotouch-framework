name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package
        run: |
          version="${GITHUB_REF_NAME#v}"
          ./scripts/package.sh "$version"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: nkp-zerotouch-framework
          path: dist/*.tar.gz
