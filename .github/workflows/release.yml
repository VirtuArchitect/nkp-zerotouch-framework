name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Package
        run: |
          version="${GITHUB_REF_NAME#v}"
          bash scripts/package.sh "$version"

      - name: Upload package
        uses: actions/upload-artifact@v6
        with:
          name: nkp-zerotouch-framework
          path: dist/*.tar.gz

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.tar.gz \
              --title "nkp-zerotouch-framework $GITHUB_REF_NAME" \
              --notes-file CHANGELOG.md
          fi
