environment:
  name: lab-airgapped
  type: air-gapped

nkp:
  version: v2.17.1
  bundleType: air-gapped
  bundlePath: /mnt/c/Share/nkp-air-gapped-bundle_v2.17.1_linux_amd64/nkp-v2.17.1
